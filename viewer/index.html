<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pixel Agent Viewer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%231a1a2e' width='32' height='32' rx='4'/><rect fill='%23f97316' x='10' y='8' width='12' height='10' rx='2'/><rect fill='%23fed7aa' x='12' y='10' width='8' height='6' rx='1'/><rect fill='%231a1a2e' x='13' y='12' width='2' height='2'/><rect fill='%231a1a2e' x='17' y='12' width='2' height='2'/><rect fill='%23f97316' x='12' y='18' width='8' height='6' rx='1'/><rect fill='%23ea580c' x='8' y='12' width='4' height='3' rx='1'/><rect fill='%23ea580c' x='20' y='12' width='4' height='3' rx='1'/></svg>">
  <link rel="stylesheet" href="css/viewer.css">
</head>
<body>
  <div id="app">
    <!-- Status Bar -->
    <header id="status-bar">
      <span id="title">🦫 Pixel Agent Viewer</span>
      <span id="connection-status">⚫ Disconnected</span>
      <span id="agent-count">Agents: 0</span>
      <span id="event-count">Events: 0</span>
      <button id="clear-btn" title="Clear history">🗑️</button>
    </header>
    
    <!-- Main Content -->
    <main id="main">
      <!-- Canvas Container -->
      <div id="canvas-container">
        <canvas id="canvas"></canvas>
      </div>
      
      <!-- Chat Panel -->
      <aside id="chat-panel">
        <header id="chat-header">
          <h3>Activity Log</h3>
          <div class="chat-header-actions">
            <button id="chat-close" title="Close panel">✕</button>
            <button id="chat-clear" title="Clear messages">🗑️</button>
          </div>
        </header>
        <div id="chat-messages"></div>
      </aside>
    </main>
    
    <!-- Control Bar -->
    <footer id="control-bar">
      <button id="chat-toggle" title="Toggle chat panel">💬</button>
      <span id="fps">FPS: 0</span>
      <span id="uptime">Uptime: 0s</span>
      <span id="server-info">Server: --</span>
    </footer>
  </div>
  
  <script type="module" src="js/viewer.js"></script>
</body>
</html>
